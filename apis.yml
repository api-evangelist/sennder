aid: sennder
name: sennder
description: >-
  sennder is Europe's leading digital road freight forwarder, connecting
  enterprise shippers with a vetted carrier network of 40,000+ small and
  medium-sized European carriers operating 250,000+ vehicles across 20+
  European markets. Headquartered in Berlin with 20 offices across Germany,
  Italy, Spain, France, Poland, the Netherlands, Latvia, and Romania,
  sennder runs its proprietary sennOS platform covering end-to-end digital
  shipment lifecycle management, real-time visibility and tracking, self-
  service booking at fixed and market prices, and integrated carrier and
  shipper portals (including a driver app and shipper TMS connectors).
  sennder operates partner-gated integration APIs for carriers, shippers,
  and TMS vendors (joined via business onboarding rather than public self-
  service), and publishes open-source tooling on GitHub including a generator
  for Python httpx + Pydantic clients from OpenAPI definitions. Sustainability
  offerings include biofuel and electric vehicle options.
