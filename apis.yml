apis:
  - aid: sennder:partner-integration
    name: sennder Partner Integration API
    description: >-
      sennder offers partner-gated integration APIs that allow shippers,
      carriers, and TMS vendors to connect to the sennOS platform for
      shipment booking, dispatch, status updates, and real-time visibility.
      These APIs are not publicly self-service; access is granted through
      business onboarding via the sennder integrations and partnerships
      teams. Capabilities typically cover load tendering, order
      acknowledgement, geolocation/tracking events, proof of delivery, and
      document exchange aligned with European road freight workflows.
